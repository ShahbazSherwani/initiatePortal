services:
  - type: web
    name: initiate-portal-api
    env: node
    buildCommand: npm install --omit=dev && npm install compression
    startCommand: node --max-old-space-size=512 src/server/server.js
    rootDir: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: initiate-portal-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://initiate-portal.vercel.app

databases:
  - name: initiate-portal-db
    databaseName: initiate_portal
    user: postgres